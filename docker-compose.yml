services:
  redis:
    image: redis:8.6.3
    container_name: ai-rag-redis
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  backend:
    build: .
    container_name: ai-rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./docs:/app/docs
      - ./chroma_db:/app/chroma_db
      - ./models:/app/models
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data: